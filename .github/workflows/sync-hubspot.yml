name: Sync HubSpot Data

on:
  schedule:
    # Run daily at 6 AM UTC (12 AM CST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger
  
jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Sync HubSpot deals and companies
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
        run: node scripts/sync-hubspot.js
        
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code deals-data-dual.js || echo "changed=true" >> $GITHUB_OUTPUT
          
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "HubSpot Sync Bot"
          git config user.email "atlas@journey.com"
          git add deals-data-dual.js
          git commit -m "Auto-sync: Update deals from HubSpot $(date -u +%Y-%m-%d)"
          git push
