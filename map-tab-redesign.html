<script>
// JavaScript for new map tab functionality

function toggleFilterPanel() {
    const panel = document.getElementById('filterPanel');
    const tab = document.getElementById('filterTabCollapsed');
    
    if (panel.classList.contains('collapsed')) {
        panel.classList.remove('collapsed');
        tab.style.display = 'none';
    } else {
        panel.classList.add('collapsed');
        tab.style.display = 'block';
    }
}

function showUnmappedModal() {
    document.getElementById('unmappedModal').style.display = 'block';
}

function closeUnmappedModal() {
    document.getElementById('unmappedModal').style.display = 'none';
}

function resetAllFilters() {
    // Check all stage filters
    document.querySelectorAll('.stage-filter-check').forEach(cb => {
        if (cb.value !== 'closed-lost') {
            cb.checked = true;
        } else {
            cb.checked = false;
        }
    });
    
    // Reset owner filter
    document.getElementById('ownerFilterCompact').value = 'all';
    
    // Clear search
    document.getElementById('searchCompact').value = '';
    
    // Trigger filter update
    applyFilters();
}
</script>
